<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI E-Book Generator Pro</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- html2pdf for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <div class="container mx-auto p-8 max-w-5xl">
        <h1 class="text-4xl font-bold text-center text-blue-600 mb-2">AI E-Book Generator Pro</h1>
        <p class="text-center text-gray-600 mb-8">Generate complete, SEO-optimized, market-ready E-Books in minutes.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Input Section -->
            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h2 class="text-2xl font-semibold mb-4 border-b pb-2">E-Book Details</h2>
                
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">OpenAI API Key (Required)</label>
                    <input type="password" id="apiKey" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="sk-...">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Author Name</label>
                    <input type="text" id="authorName" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Your Name">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Niche / Topic</label>
                    <input type="text" id="niche" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Self-help, Business, Freelancing">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Source Document / Main Idea</label>
                    <textarea id="sourceText" rows="6" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Paste your notes, blog posts, or main ideas here..."></textarea>
                </div>

                <button id="generateBtn" onclick="generateEbook()" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-300">
                    Generate E-Book
                </button>
                
                <div id="loading" class="hidden mt-4 text-center text-blue-600 font-semibold text-lg">
                    Generating your E-book... This may take a few minutes depending on the length. Please wait...
                </div>
            </div>

            <!-- Output Section -->
            <div class="bg-white p-6 rounded-lg shadow-lg flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-2xl font-semibold">Generated E-Book</h2>
                    <div id="downloadButtons" class="hidden space-x-2">
                        <button onclick="downloadPDF()" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 text-sm">Download PDF</button>
                        <button onclick="downloadWord()" class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600 text-sm">Download Word</button>
                    </div>
                </div>
                
                <div id="outputArea" class="flex-grow border rounded-lg p-4 bg-gray-50 overflow-y-auto max-h-[600px] prose">
                    <p class="text-gray-400 text-center mt-10">Your generated E-Book will appear here...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function generateEbook() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const authorName = document.getElementById('authorName').value.trim();
            const niche = document.getElementById('niche').value.trim();
            const sourceText = document.getElementById('sourceText').value.trim();

            if (!apiKey || !sourceText || !niche) {
                alert("Please provide API Key, Niche, and Source Document.");
                return;
            }

            // UI Updates
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('generateBtn').classList.add('opacity-50');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('outputArea').innerHTML = '';
            document.getElementById('downloadButtons').classList.add('hidden');

            // The exact prompt instruction based on your JSON structure
            const systemPrompt = `You are an expert ghostwriter, editor, and Amazon KDP strategist. Your task is to create a complete, ready-to-publish E-Book.
            
            Follow these instructions strictly:
            1. Analyze the provided source text, extract key points, remove redundancy, expand content, and enhance clarity.
            2. Language: English. Tone: Professional, engaging, reader-friendly. Audience: Global readers.
            3. Provide an SEO-optimized Title and compelling Subtitle. Author Name: ${authorName || 'The Author'}.
            4. Create a Table of Contents.
            5. Write 5-10 chapters. Each chapter must have: Title, Introduction, Main Content, Examples/Case Studies, Actionable Tips, and a Summary.
            6. Include Additional Sections: Introduction, Conclusion, About the Author, Call to Action.
            7. Formatting: Use H1, H2, H3 Markdown headings, bullet points, and highlight important points in bold.
            8. Provide Marketplace Optimization at the very end: Generate 10-20 SEO keywords, a persuasive sales description, suggest best categories (Amazon KDP, Gumroad), pricing strategy, and an E-book cover concept.`;

            const userPrompt = `Niche: ${niche}\n\nSource Document/Idea:\n${sourceText}\n\nPlease generate the complete E-Book now.`;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o', // or 'gpt-3.5-turbo' for cheaper/faster results
                        messages:[
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 4000
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const generatedMarkdown = data.choices[0].message.content;
                
                // Convert Markdown to HTML
                document.getElementById('outputArea').innerHTML = marked.parse(generatedMarkdown);
                
                // Show Download Buttons
                document.getElementById('downloadButtons').classList.remove('hidden');

            } catch (error) {
                document.getElementById('outputArea').innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
            } finally {
                // Reset UI
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('generateBtn').classList.remove('opacity-50');
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // PDF Download Function
        function downloadPDF() {
            const element = document.getElementById('outputArea');
            const opt = {
                margin:       1,
                filename:     'Generated_EBook.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Word (DOC) Download Function
        function downloadWord() {
            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML to Word Document with JavaScript</title></head><body>";
            const footer = "</body></html>";
            const html = header + document.getElementById('outputArea').innerHTML + footer;
            
            const blob = new Blob(['\ufeff', html], {
                type: 'application/msword'
            });
            
            const url = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(html);
            const downloadLink = document.createElement("a");
            document.body.appendChild(downloadLink);
            
            if (navigator.msSaveOrOpenBlob) {
                navigator.msSaveOrOpenBlob(blob, 'Generated_EBook.doc');
            } else {
                downloadLink.href = url;
                downloadLink.download = 'Generated_EBook.doc';
                downloadLink.click();
            }
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
